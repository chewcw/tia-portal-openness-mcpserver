name: CLI Release

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  cli-publish:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update CLI version
        run: |
          if [ -n "${{ github.event.release.name }}" ]; then
            VERSION="${{ github.event.release.name }}"
          else
            VERSION=$(gh api repos/${{ github.repository }}/releases/latest --jq '.name')
          fi
          VERSION="${VERSION#Release v}"
          npm version --no-git-tag-version "$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Commit version updates
      #   run: |
      #     VERSION="${{ github.event.release.name }}"
      #     VERSION="${VERSION#Release v}"
      #     git config --local user.email "github-actions[bot]@users.noreply.github.com"
      #     git config --local user.name "github-actions[bot]"
      #     git add package.json package-lock.json
      #     git commit -m "Bump CLI version to $VERSION" || echo "No changes to commit"

      # - name: Push changes
      #   run: |
      #     git push || echo "Push may have failed, continuing..."

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Remove NODE_AUTH_TOKEN
        run: |
          unset NODE_AUTH_TOKEN
          npm whoami

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: 'true'
