name: Release

on:
  push:
    branches:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  cli-publish:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update CLI version
        run: |
          VERSION="${{ github.ref }}"
          VERSION="${VERSION#refs/heads/}"
          VERSION="${VERSION#v}"
          cd cli
          npm version --no-git-tag-version "$VERSION"

      - name: Commit version updates
        run: |
          VERSION="${{ github.ref }}"
          VERSION="${VERSION#refs/heads/}"
          VERSION="${VERSION#v}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cli/package.json cli/package-lock.json
          git commit -m "Bump version to $VERSION" || echo "No changes to commit"

      - name: Push changes
        run: |
          BRANCH="${{ github.ref }}"
          BRANCH="${BRANCH#refs/heads/}"
          git push origin "$BRANCH" || echo "Push may have failed, continuing..."

      - name: Create Pull Request
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref }}"
          BRANCH="${BRANCH#refs/heads/}"
          VERSION="${BRANCH#v}"
          gh pr create --base master --head "$BRANCH" --title "Release v$VERSION" --body "Release version $VERSION" 2>/dev/null || echo "PR may already exist"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Publish package
        run: NODE_AUTH_TOKEN="" npm publish --provenance

  release:
    name: Build and publish release
    runs-on: windows-latest
    needs: [cli-publish]

    env:
      TIA_PUBLICAPI_RELEASE_REPOSITORY: ${{ vars.TIA_PUBLICAPI_RELEASE_REPOSITORY }}
      TIA_PUBLICAPI_RELEASE_TAG: ${{ vars.TIA_PUBLICAPI_RELEASE_TAG }}
      TIA_PUBLICAPI_RELEASE_ASSET_NAME: ${{ vars.TIA_PUBLICAPI_RELEASE_ASSET_NAME }}

    # Required to create GitHub Releases and upload assets
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update .NET version
        shell: pwsh
        run: |
          $version = "${{ github.ref }}".Replace("refs/heads/", "").TrimStart('v')
          
          foreach ($csproj in @("TiaPortalMcpServer/TiaPortalMcpServer.csproj", "TiaPortalMcpServer.Tests/TiaPortalMcpServer.Tests.csproj")) {
            if (Test-Path $csproj) {
              [xml]$xml = Get-Content $csproj
              $ns = @{p = "http://schemas.microsoft.com/developer/msbuild/2003"}
              $propertyGroup = $xml.SelectSingleNode("//p:PropertyGroup[not(p:Version)]", $ns)
              
              if ($null -eq $propertyGroup) {
                $propertyGroup = $xml.CreateElement("PropertyGroup", "http://schemas.microsoft.com/developer/msbuild/2003")
                $xml.Project.AppendChild($propertyGroup) | Out-Null
              }
              
              $versionEl = $xml.SelectSingleNode("//p:Version", $ns)
              if ($null -eq $versionEl) {
                $versionEl = $xml.CreateElement("Version", "http://schemas.microsoft.com/developer/msbuild/2003")
                $propertyGroup.AppendChild($versionEl) | Out-Null
              }
              $versionEl.InnerText = $version
              
              $xml.Save($csproj)
            }
          }

      - name: Commit version updates
        run: |
          VERSION="${{ github.ref }}"
          VERSION="${VERSION#refs/heads/}"
          VERSION="${VERSION#v}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add "TiaPortalMcpServer/TiaPortalMcpServer.csproj" "TiaPortalMcpServer.Tests/TiaPortalMcpServer.Tests.csproj"
          git commit -m "Bump version to $VERSION" || echo "No changes to commit"

      - name: Push changes
        run: |
          BRANCH="${{ github.ref }}"
          BRANCH="${BRANCH#refs/heads/}"
          git push origin "$BRANCH" || echo "Push may have failed, continuing..."

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Stage TIA Portal PublicAPI bundle
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.TIA_PUBLICAPI_GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            Write-Error "Secret TIA_PUBLICAPI_GITHUB_TOKEN is required. Provide a token with read access to the release asset repository."
          }

          if ([string]::IsNullOrWhiteSpace($env:TIA_PUBLICAPI_RELEASE_REPOSITORY)) {
            Write-Error "Repository variable TIA_PUBLICAPI_RELEASE_REPOSITORY is required (owner/repo)."
          }

          if ([string]::IsNullOrWhiteSpace($env:TIA_PUBLICAPI_RELEASE_TAG)) {
            Write-Error "Repository variable TIA_PUBLICAPI_RELEASE_TAG is required (for example: v20-publicapi)."
          }

          if ([string]::IsNullOrWhiteSpace($env:TIA_PUBLICAPI_RELEASE_ASSET_NAME)) {
            Write-Error "Repository variable TIA_PUBLICAPI_RELEASE_ASSET_NAME is required (for example: PortalV20-PublicAPI-V20.zip)."
          }

          $extractRoot = Join-Path $env:RUNNER_TEMP 'tia-publicapi-v20'

          if (Test-Path $extractRoot) {
            Remove-Item -Path $extractRoot -Recurse -Force
          }

          gh release download $env:TIA_PUBLICAPI_RELEASE_TAG `
            --repo $env:TIA_PUBLICAPI_RELEASE_REPOSITORY `
            --pattern $env:TIA_PUBLICAPI_RELEASE_ASSET_NAME `
            --dir $env:RUNNER_TEMP

          $bundlePath = Join-Path $env:RUNNER_TEMP $env:TIA_PUBLICAPI_RELEASE_ASSET_NAME
          if (-not (Test-Path $bundlePath)) {
            Write-Error "Could not find downloaded asset at '$bundlePath'. Ensure '$env:TIA_PUBLICAPI_RELEASE_ASSET_NAME' exists in $env:TIA_PUBLICAPI_RELEASE_REPOSITORY@$env:TIA_PUBLICAPI_RELEASE_TAG."
          }
          Expand-Archive -Path $bundlePath -DestinationPath $extractRoot -Force

          $engineeringDll = Get-ChildItem -Path $extractRoot -Filter 'Siemens.Engineering.dll' -Recurse |
            Select-Object -First 1

          if ($null -eq $engineeringDll) {
            Write-Error "The staged bundle did not contain Siemens.Engineering.dll anywhere in the archive."
          }

          if ($engineeringDll.FullName -match '[\\/]+PublicAPI[\\/]+V20[\\/]+') {
            $v20Directory = Split-Path -Path $engineeringDll.FullName -Parent
            $publicApiDirectory = Split-Path -Path $v20Directory -Parent
            $tiaPortalLocation = Split-Path -Path $publicApiDirectory -Parent
          } else {
            # DLL found but not in a PublicAPI/V20 directory tree.
            # Build the expected layout so MSBuild can resolve TiaPortalLocation.
            # Copy recursively to preserve any localization sub-directories that
            # may exist alongside the assemblies (e.g. de-DE\, en-US\).
            $tiaPortalLocation = Join-Path $env:RUNNER_TEMP 'tia-portal-staged'
            $v20Directory = Join-Path $tiaPortalLocation 'PublicAPI\V20'
            New-Item -ItemType Directory -Path $v20Directory -Force | Out-Null
            $dllSourceDir = Split-Path -Path $engineeringDll.FullName -Parent
            Copy-Item -Path "$dllSourceDir\*" -Destination $v20Directory -Recurse -Force
          }

          "TiaPortalLocation=$tiaPortalLocation" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore NuGet packages
        run: dotnet restore tia-portal-openness-mcpserver.sln

      - name: Build (Release)
        run: dotnet build tia-portal-openness-mcpserver.sln -c Release --no-restore -p:TiaPortalLocation="${{ env.TiaPortalLocation }}"

      - name: Run unit tests (TIA Portal-free only)
        # Using Task to run unit tests. The test:unit:ci task filters out integration
        # tests that require TIA Portal to be installed and runs in Release mode.
        run: task test:unit:ci

      - name: Publish application
        run: >
          dotnet publish TiaPortalMcpServer/TiaPortalMcpServer.csproj
          -c Release -f net48 --no-build
          -p:TiaPortalLocation="${{ env.TiaPortalLocation }}"
          --output ./dist

      - name: Set zip name
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}".Replace("refs/heads/", "")
          $zipName = "TiaPortalMcpServer-$ref".Replace('/', '-')
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package as zip
        shell: pwsh
        run: Compress-Archive -Path ./dist/* -DestinationPath "./${{ env.ZIP_NAME }}.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF="${{ github.ref }}".Replace("refs/heads/", "")
          gh release create "$REF" ./${{ env.ZIP_NAME }}.zip --title "Release $REF" --generate-notes
