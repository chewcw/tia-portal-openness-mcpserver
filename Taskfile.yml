version: '3'
tasks:
    cli:install:
        cmds:
            - cd cli && npm install
    cli:typecheck:
        cmds:
            - cd cli && npm run typecheck
    cli:build:
        cmds:
            - cd cli && npm run build
    cli:test:
        cmds:
            - cd cli && npm run test
    inspector:
        cmds:
            - npx @modelcontextprotocol/inspector dotnet run --project TiaPortalMcpServer/TiaPortalMcpServer.csproj
    test:
        cmds:
            - dotnet test TiaPortalMcpServer.Tests/TiaPortalMcpServer.Tests.csproj
    test:unit:
        cmds:
            - dotnet test TiaPortalMcpServer.Tests/TiaPortalMcpServer.Tests.csproj --filter "Category!=Integration"
    test:unit:ci:
        desc: Run unit tests for CI (Release mode, no rebuild)
        cmds:
            - dotnet test TiaPortalMcpServer.Tests/TiaPortalMcpServer.Tests.csproj -c Release --no-build --filter "Category!=Integration"
    test:integration:
        cmds:
            - dotnet test TiaPortalMcpServer.Tests/TiaPortalMcpServer.Tests.csproj --filter "Category=Integration"